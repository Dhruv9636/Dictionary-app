<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"> 

  
</head>
<body>
    <h1>Dictionary</h1>
    <div class="card search-card">
        <div class="search-word">
            <input type="search" name="word" placeholder="Search Any Word...">
            <button class="search-btn" type="button">
                <img src="search.png" alt="search" class="btn-img">
            </button>
        </div>
    </div>
    <div class="card result-card hide">
        <div class="result-word">
            <div class="word-sound same2">
                <h3 class="word-head same">Word: <p class="word"> Apple</p></h3>
                <div class="result-sound same">
                    <h3 class="sound-text">
                        Pronunciation:
                    </h3>
                    <div class="sound">
                        <audio src="aud.wav" controls></audio>
                    </div>
                </div>
            </div>
            <div class="result-noun same2">
                <h3 class="noun-result same">Part Of Speech: <p class="pos">A round fruit...</p></h3>
            </div>
            <div class="result-syn same2">
                <h3 class="syn-head same">Synonyms: <p class="syn">fruit, pome, orchard</p></h3>
            </div>
            <div class="result-ant same2">
                <h3 class="ant-head same">Antonyms: <p class="ant">Antonym</p></h3>
            </div>
        </div>
        <div class="back-btn">
            <button class="backBtn">Back</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
